<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫雷 - Minesweeper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>💣 扫雷 <span id="shieldIcon"></span></h1>
        <div id="toolbar">
            <div class="toolbar-group">
                <label for="difficulty">难度:</label>
                <select id="difficulty">
                    <option value="easy">初级 9×9</option>
                    <option value="medium" selected>中级 16×16</option>
                    <option value="hard">高级 30×16</option>
                </select>
                <button id="newGameBtn">🔄 新游戏</button>
                <button id="nukeBtn">☢️ 核弹 <span id="nukeCountdown"></span></button>
            </div>
            <div class="toolbar-group">
                <span id="mineCount">💣 0</span>
                <span id="timer">⏱ 000</span>
            </div>
        </div>
        <div id="comboDisplay"></div>
        <div id="board"></div>
        <p id="message"></p>
    </div>

    <!-- Death Analysis Modal -->
    <div id="deathModal">
        <div id="deathContent">
            <h2>💀 死亡分析</h2>
            <div id="deathBody"></div>
            <br>
            <button id="closeDeathBtn">知道了，再来一局</button>
        </div>
    </div>

    <!-- Lightning overlay -->
    <div id="lightningOverlay" class="lightning"></div>

    <!-- Victory Overlay -->
    <div id="victoryOverlay">
        <div id="victoryContent">
            <div class="stars"></div>
            <div class="trophy">🏆</div>
            <h1>🎉</h1>
            <div class="sub">✦ 你赢了 ✦</div>
            <div class="stats">
                <div class="stat-item">
                    <div class="num" id="winTime">000</div>
                    <div class="label">用时 (秒)</div>
                </div>
                <div class="stat-item">
                    <div class="num" id="winDifficulty">-</div>
                    <div class="label">难度</div>
                </div>
                <div class="stat-item">
                    <div class="num" id="winCombo">0</div>
                    <div class="label">最高连击</div>
                </div>
            </div>
            <div class="quote"></div>
            <button id="playAgainBtn">🔄 再来一局</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
